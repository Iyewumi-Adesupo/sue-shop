version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers=4
    expose:
      - "8000"
    env_file:
      - .env.prod

  frontend:
    build:
      context: ./frontend/my-app
      dockerfile: Dockerfile.prod
    volumes: []   # no bind mounts in prod
    command: ""   # built app served by nginx

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/my-app/dist:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend