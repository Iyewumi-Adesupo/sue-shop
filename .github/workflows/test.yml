name: CI Tests

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: susan
          POSTGRES_PASSWORD: susan
          POSTGRES_DB: susan
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U susan"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SECRET_KEY: dummy-secret
      DEBUG: False

      POSTGRES_DB: susan
      POSTGRES_USER: susan
      POSTGRES_PASSWORD: susan
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432

      STRIPE_SECRET_KEY: dummy
      STRIPE_PUBLISHABLE_KEY: dummy
      STRIPE_WEBHOOK_SECRET: dummy

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run backend tests
        run: |
          cd backend
          python manage.py migrate
          pytest

      - name: Run flake8
        run: |
          cd backend
          pip install flake8
          flake8 .

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/my-app/package-lock.json

      - name: Install frontend deps
        run: |
          cd frontend/my-app
          npm install

      - name: Build frontend
        run: |
          cd frontend/my-app
          npm run build