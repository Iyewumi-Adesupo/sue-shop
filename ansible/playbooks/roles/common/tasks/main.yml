---
- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"
  when: 
    - ansible_os_family != 'Darwin'
    - timezone is defined

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_os_family == 'Debian'

- name: Install common packages
  apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - lsb-release
      - unzip
    state: present
  when: ansible_os_family == 'Debian'