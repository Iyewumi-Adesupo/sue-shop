---
- name: Install nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Remove default nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Create nginx config for Sue-Shop
  copy:
    dest: /etc/nginx/sites-available/sueshop
    content: |
      server {
        listen {{ nginx_listen_port }};
        server_name {{ nginx_server_name }};

        location / {
          proxy_pass http://127.0.0.1:{{ backend_port }};
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
      }

- name: Enable Sue-Shop nginx site
  file:
    src: /etc/nginx/sites-available/sueshop
    dest: /etc/nginx/sites-enabled/sueshop
    state: link

- name: Restart nginx
  systemd:
    name: nginx
    state: restarted