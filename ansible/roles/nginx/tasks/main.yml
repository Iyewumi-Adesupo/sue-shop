- name: Install nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Remove default nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Deploy static frontend
  copy:
    src: frontend/
    dest: /var/www/sueshop/
    owner: www-data
    group: www-data
    mode: '0755'

- name: Create hardened nginx config for Sue-Shop
  copy:
    dest: /etc/nginx/sites-available/sueshop
    owner: root
    group: root
    mode: '0644'
    content: |
      server {
        listen {{ nginx_listen_port }};
        server_name {{ nginx_server_name }};

        root /var/www/sueshop;
        index index.html;

        # Frontend (always available)
        location / {
          try_files $uri $uri/ /index.html;
        }

        # API (isolated failures)
        location /api/ {
          proxy_pass http://127.0.0.1:{{ backend_port }};

          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

          proxy_connect_timeout 2s;
          proxy_read_timeout 5s;
          proxy_send_timeout 5s;

          proxy_intercept_errors on;
          error_page 502 503 504 = /api-unavailable.json;
        }

        # API fallback (backend down)
        location = /api-unavailable.json {
          default_type application/json;
          return 200 '{"status":"degraded","message":"Service temporarily unavailable"}';
        }

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2)$ {
          expires 1y;
          add_header Cache-Control "public, immutable";
        }

        error_page 500 502 503 504 /maintenance.html;
      }

- name: Enable Sue-Shop nginx site
  file:
    src: /etc/nginx/sites-available/sueshop
    dest: /etc/nginx/sites-enabled/sueshop
    state: link
    force: yes

- name: Restart nginx
  systemd:
    name: nginx
    state: restarted

- name: Deploy static frontend
  copy:
    src: frontend/
    dest: /var/www/sueshop/
    owner: www-data
    group: www-data
    mode: '0755'