version: "3.9"

services:
  db:
    image: postgres:14
    container_name: sue-shop-db
    env_file:
      - .env.dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: sue-shop-backend
    volumes:
      - ./backend:/app
      - static_volume:/app/static
      - media_volume:/app/media
    ports:               # only visible to other containers
      - "8000:8000"
    env_file:
      - .env.dev
    depends_on:
      - db
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend/my-app
      dockerfile: Dockerfile   
    container_name: sue-shop-frontend
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend/my-app:/app
      - /app/node_modules   # use container’s node_modules, not host
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: sue-shop-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro   # ✅ fixed path
      - static_volume:/app/static:ro
      - media_volume:/app/media:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

volumes:
  pgdata:
  static_volume:
  media_volume:

networks:
  app-network:
    driver: bridge